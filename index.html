<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para o Meu Amor ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; /* Remove o flash azul ao tocar no mobile */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fad0c4, #ff9a9e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden; /* Trava a rolagem do fundo da página */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Container Principal */
        #surprise-container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 2rem 1.5rem;
            width: 95%;
            max-width: 450px;
            max-height: 95vh; /* Impede que vaze verticalmente */
            overflow-y: auto; /* Rola conteúdo interno se necessário */
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
            /* Esconde barra de rolagem */
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        #surprise-container::-webkit-scrollbar { display: none; }

        /* Carrossel de Fotos */
        .photo-frame {
            width: 130px;
            height: 130px;
            margin: 0 auto 1rem auto;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .photo-frame img.active { opacity: 1; }

        .step-counter {
            font-size: 0.8rem;
            color: #d81b60;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            font-size: 2.6rem;
            margin-bottom: 0.5rem;
        }

        /* Contador */
        .live-counter {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            padding: 10px;
            margin: 1rem 0;
            display: flex;
            justify-content: space-between;
            gap: 5px;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 24%;
        }

        .time-box span.number {
            font-size: 1.4rem;
            font-weight: 600;
            color: #d81b60;
        }

        .time-box span.label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #666;
            font-weight: 600;
        }

        .typewriter-text {
            min-height: 2.5em;
            color: #ad1457;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        #main-text {
            font-size: 0.95rem;
            color: #444;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            min-height: 80px; 
        }

        /* Área dos Botões */
        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            min-height: 120px; /* Aumentado para dar espaço ao "Não" antes de fugir */
            position: relative;
            width: 100%;
        }

        button {
            width: 100%; 
            max-width: 260px;
            padding: 14px 15px;
            border-radius: 50px;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            /* Transição suave apenas para cor, transform e opacity inicialmente */
            transition: background-color 0.2s ease, transform 0.1s, opacity 0.5s ease;
        }

        button:active { transform: scale(0.95); }

        #btn-sim {
            background-color: #d81b60;
            color: white;
            z-index: 2;
        }

        #btn-sim:hover { background-color: #ad1457; }

        #btn-nao {
            background-color: #fce4ec;
            color: #d81b60;
            z-index: 1; /* Começa atrás do Sim se houver sobreposição */
            /* Quando fugir, adicionaremos a transição de movimento via JS */
        }

        /* Telas Ocultas */
        .hidden { display: none !important; }

        .success-content {
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .particle {
            position: absolute;
            user-select: none;
            pointer-events: none;
            z-index: 100;
        }

        /* Media Queries Mobile */
        @media (max-width: 400px) {
            #surprise-container { padding: 1.5rem 1rem; }
            .photo-frame { width: 100px; height: 100px; }
            h1 { font-size: 2.2rem; }
            .time-box span.number { font-size: 1.2rem; }
            #main-text { font-size: 0.85rem; min-height: 60px; }
            button { padding: 12px 10px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <audio id="musica" src="musica.mp3"></audio>

    <div id="surprise-container">
        
        <div class="photo-frame">
            <img src="foto.jpg" alt="Foto 1" class="active">
        </div>

        <div id="main-content">
            <span id="step-counter" class="step-counter hidden"></span>
            <h1 id="title">Oi, Minha Vida! ❤️</h1>
            
            <div id="first-screen-extras">
                <div class="typewriter-text" id="typewriter"></div>
                <div class="live-counter">
                    <div class="time-box"><span class="number" id="dias">516</span><span class="label">Dias</span></div>
                    <div class="time-box"><span class="number" id="horas">00</span><span class="label">Horas</span></div>
                    <div class="time-box"><span class="number" id="minutos">00</span><span class="label">Min</span></div>
                    <div class="time-box"><span class="number" id="segundos">00</span><span class="label">Seg</span></div>
                </div>
            </div>

            <div id="main-text"></div>

            <div class="btn-group" id="btn-group">
                <button id="btn-sim" onclick="proximaEtapa()">COM CERTEZA!</button>
                <button id="btn-nao" onmouseenter="fugir(event)" ontouchstart="fugir(event)">Não</button>
            </div>
        </div>

        <div id="success-screen" class="hidden success-content">
            <div style="font-size: 70px; margin-bottom: 15px;">😍💍✨</div>
            <h1 style="font-size: 3rem;">Eu sabia!</h1>
            <p style="font-size: 1.05rem; color: #444; line-height: 1.6; margin-bottom: 1.5rem;">
                Você é a minha melhor escolha todos os dias.<br>
                Nosso deploy na Main está garantido para a eternidade!
            </p>
            <p style="font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: #ad1457;">Ass: Gustavo</p>
        </div>
    </div>

    <script>
        // Lógica do Carrossel e Timer (Inalterados)
        const photos = document.querySelectorAll('.photo-frame img');
        let currentPhotoIndex = 0;
        setInterval(() => {
            photos[currentPhotoIndex].classList.remove('active');
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
            photos[currentPhotoIndex].classList.add('active');
        }, 3000);

        const dataInicio = new Date();
        dataInicio.setDate(dataInicio.getDate() - 516);
        function atualizarContador() {
            const agora = new Date();
            const diferenca = agora - dataInicio;
            document.getElementById('dias').innerText = Math.floor(diferenca / (1000 * 60 * 60 * 24));
            document.getElementById('horas').innerText = Math.floor((diferenca / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
            document.getElementById('minutos').innerText = Math.floor((diferenca / 1000 / 60) % 60).toString().padStart(2, '0');
            document.getElementById('segundos').innerText = Math.floor((diferenca / 1000) % 60).toString().padStart(2, '0');
        }
        setInterval(atualizarContador, 1000);
        atualizarContador();

        const textToType = "Em cada linha de código da minha vida, você é a variável principal...";
        let i = 0;
        function typeWriter() {
            if (i < textToType.length) {
                document.getElementById("typewriter").innerHTML += textToType.charAt(i);
                i++;
                setTimeout(typeWriter, 40);
            }
        }
        window.onload = typeWriter;

        // --- FLUXO DE PERGUNTAS ---
        const etapas = [
            {
                passo: "",
                titulo: "Oi, Amor! ❤️",
                texto: "516 dias de muita parceria, risadas e o melhor loop de amor do universo.<br><br>(ou 1 ano e 5 meses no deploy da nossa felicidade).<br><br><b>Você aceita continuar me fazendo a pessoa mais feliz do mundo?</b>",
                btnSim: "COM CERTEZA!",
                btnNao: "Não"
            },
            {
                passo: "PASSO 1 DE 5 DE CONFIRMAÇÃO",
                titulo: "Tem certeza?",
                texto: "Mas tem certeza <b>mesmo</b>? Nosso commit é longo e maravilhoso... Pensa bem nos nossos infinitos commits diários de amor.",
                btnSim: "Sim, tenho certeza!",
                btnNao: "Vou pensar mais..."
            },
            {
                passo: "PASSO 2 DE 5 DE CONFIRMAÇÃO",
                titulo: "Absoluta?",
                texto: "Olha que na nossa branch principal não tem <code>git revert</code> nem <code>CTRL+Z</code>! É um merge direto na main.",
                btnSim: "Eu assumo o risco!",
                btnNao: "Melhor dar rollback..."
            },
            {
                passo: "PASSO 3 DE 5 DE CONFIRMAÇÃO",
                titulo: "Pensa bem...",
                texto: "Vai ter que me aturar pedindo cafuné todos os dias. É literalmente um <code>while(true) { amor++; }</code>. Tem certeza?",
                btnSim: "Eu amo esse loop!",
                btnNao: "Break;"
            },
            {
                passo: "PASSO 4 DE 5 DE CONFIRMAÇÃO",
                titulo: "Sem pressão...",
                texto: "Se clicar em SIM de novo, vamos ter que ser felizes para o resto da vida. Não diga que não avisei!",
                btnSim: "É o que eu mais quero!",
                btnNao: "Pera, me dá um tempo..."
            },
            {
                passo: "ÚLTIMA CONFIRMAÇÃO",
                titulo: "Última chance!",
                texto: "Aperte o botão para confirmar nossa união para sempre no servidor de produção da vida. ❤️",
                btnSim: "Fazer Deploy do Amor! 🚀",
                btnNao: "Abortar missão!"
            }
        ];

        let etapaAtual = 0;
        let podeFugir = false;

        function carregarEtapa() {
            const etapa = etapas[etapaAtual];
            
            document.getElementById('title').innerHTML = etapa.titulo;
            document.getElementById('main-text').innerHTML = etapa.texto;
            document.getElementById('btn-sim').innerText = etapa.btnSim;
            
            // RESET DO BOTÃO "NÃO" (Trazer de volta para dentro do container se ele fugiu)
            const btnNao = document.getElementById('btn-nao');
            const btnGroup = document.getElementById('btn-group');
            
            // Se ele estiver no Body, movemos de volta para o grupo de botões
            if (btnNao.parentNode !== btnGroup) {
                // Remove a transição de movimento para ele voltar instantaneamente
                btnNao.style.transition = 'background-color 0.2s ease, transform 0.1s, opacity 0.5s ease';
                btnNao.style.position = 'relative';
                btnNao.style.left = 'auto';
                btnNao.style.top = 'auto';
                btnNao.style.width = '100%'; // Restaura largura responsiva
                btnGroup.appendChild(btnNao);
            }
            
            btnNao.innerText = etapa.btnNao;

            const counter = document.getElementById('step-counter');
            if (etapa.passo) {
                counter.innerText = etapa.passo;
                counter.classList.remove('hidden');
            }

            if (etapaAtual > 0) {
                document.getElementById('first-screen-extras').style.display = 'none';
            }
            
            podeFugir = false;
            setTimeout(() => { podeFugir = true; }, 500);
        }

        function proximaEtapa() {
            etapaAtual++;
            if (etapaAtual >= etapas.length) {
                celebrar();
            } else {
                carregarEtapa();
            }
        }

        // --- LÓGICA DE FUGA PELA TELA TODA (CORRIGIDA) ---
        function fugir(e) {
            if (e && e.type === 'touchstart') e.preventDefault();
            if (!podeFugir) return;

            const btnNao = document.getElementById('btn-nao');
            
            // A MÁGICA: Se ele ainda estiver dentro da caixa branca, nós arrancamos ele de lá
            if (btnNao.parentNode !== document.body) {
                // Pega a posição exata dele na tela ANTES de mover
                const rect = btnNao.getBoundingClientRect();
                const larguraAtual = btnNao.offsetWidth;

                // Define a posição exata e trava a largura para ele não deformar ao sair
                btnNao.style.width = larguraAtual + 'px';
                btnNao.style.left = rect.left + 'px';
                btnNao.style.top = rect.top + 'px';
                btnNao.style.position = 'fixed';
                
                // Move o elemento para o <body> (sai de dentro do container branco)
                document.body.appendChild(btnNao);
                
                // Força o navegador a processar a mudança de DOM
                void btnNao.offsetWidth; 

                // Agora adiciona a transição de movimento suave (apenas para left/top)
                btnNao.style.transition = 'left 0.3s ease-out, top 0.3s ease-out, background-color 0.2s ease, transform 0.1s, opacity 0.5s ease';
            }

            // Cálculos exatos baseados na viewport inteira
            const larguraBtn = btnNao.offsetWidth;
            const alturaBtn = btnNao.offsetHeight;
            const margem = 15; // Margem de segurança das bordas da tela

            const limiteX = window.innerWidth - larguraBtn - margem;
            const limiteY = window.innerHeight - alturaBtn - margem;

            // Gera nova posição aleatória pela tela toda
            const novoX = Math.max(margem, Math.floor(Math.random() * limiteX));
            const novoY = Math.max(margem, Math.floor(Math.random() * limiteY));

            btnNao.style.left = novoX + 'px';
            btnNao.style.top = novoY + 'px';
        }

        // Celebração Final (Inalterada)
        function celebrar() {
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('success-screen').classList.remove('hidden');
            document.getElementById('musica').play().catch(() => {});
            
            const interval = setInterval(criarParticula, 80);
            setTimeout(() => clearInterval(interval), 5000);
        }

        function criarParticula() {
            const p = document.createElement('div');
            p.classList.add('particle');
            const tipos = ['❤️', '💖', '✨', '💕', '🥰', '🎉'];
            p.innerHTML = tipos[Math.floor(Math.random() * tipos.length)];
            
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '-5vh'; 
            p.style.fontSize = Math.random() * 20 + 15 + 'px';
            
            const duracao = Math.random() * 2 + 3;
            p.style.transition = `top ${duracao}s linear, left ${duracao}s ease-in-out, transform ${duracao}s linear, opacity ${duracao}s ease-in`;
            
            document.body.appendChild(p);

            setTimeout(() => {
                p.style.top = '110vh';
                p.style.left = (parseFloat(p.style.left) + (Math.random() - 0.5) * 30) + 'vw';
                p.style.transform = `rotate(${Math.random() * 720}deg)`;
                p.style.opacity = '0';
            }, 50);

            setTimeout(() => p.remove(), duracao * 1000);
        }

        carregarEtapa();
    </script>
</body>
</html>
